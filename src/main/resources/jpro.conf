# JPro session reaping.
#
# By default JPro keeps a disconnected session (browser tab) alive for 5-180s before it ends
# the JavaFX instance (and fires Application.stop()). Because we cap the game to ONE concurrent
# session, an abandoned tab would otherwise hold the only slot for minutes and block everyone.
#
# We keep closeOnTabCloseAfter = 0 (a clean tab close frees the slot immediately) and set
# closeOnDisconnectAfter = 30 on every tier, so a hard disconnect (browser killed, navigated
# away, network drop) frees the slot within ~30s. A refresh within that window reconnects to the
# same live game. Raise closeOnDisconnectAfter to be more forgiving of blips, lower it to free
# the slot faster for the next player. (HOCON: fields are newline-separated, not ';'-separated.)
jpro {
  closeInstanceStrategy {
    short {
      until = 60
      closeOnTabCloseAfter = 0
      closeOnDisconnectAfter = 30
      closeOnAFKAfter = -1
      closeOnBackgroundAfter = -1
    }
    medium {
      until = 900
      closeOnTabCloseAfter = 0
      closeOnDisconnectAfter = 30
      closeOnAFKAfter = -1
      closeOnBackgroundAfter = -1
    }
    long {
      closeOnTabCloseAfter = 0
      closeOnDisconnectAfter = 30
      closeOnAFKAfter = -1
      closeOnBackgroundAfter = -1
    }
  }
}
